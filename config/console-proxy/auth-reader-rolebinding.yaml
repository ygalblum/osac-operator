# Grants the console-proxy SA access to the extension-apiserver-authentication
# ConfigMap in kube-system (required for aggregated API auth delegation).
#
# The kustomize namespace transformer overrides namespace to the base namespace.
# The target-namespace annotation preserves the intended value; the installer
# overlay's replacements read this annotation and restore namespace to kube-system
# after the transformer runs.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osac-console-proxy-auth-reader
  namespace: kube-system
  annotations:
    osac.openshift.io/target-namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
- kind: ServiceAccount
  name: osac-console-proxy
